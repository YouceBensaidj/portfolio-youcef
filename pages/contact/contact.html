<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Youcef BENSAIDJ</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="Contact.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">Youcef <span>BENSAIDJ</span></div>
    </header>

    <main class="contact-container">
        <section class="contact-header">
            <h1 class="section-title">ME CONTACTER</h1>
            <p>Une question sur un projet ou une opportunité de stage ? N'hésitez pas à m'envoyer un message.</p>
        </section>

        <div class="contact-wrapper">
            <aside class="contact-info">
                <div class="info-card">
                    <h3>Coordonnées</h3>
                    <div class="info-item">
                        <span class="icon">📧</span>
                        <div>
                            <label>Email</label>
                            <a href="mailto:bensaidjyoucef@gmail.com">bensaidjyoucef@gmail.com</a>
                        </div>
                    </div>
                    <div class="info-item">
                        <span class="icon"> <a href="https://www.linkedin.com/in/youcef-bensaidj-electronics/" target="_blank"> <img src="/assets/images/linkedin-brands-solid.png" alt="LinkedIn" class="social-icon"> </a> </span>
                        <div>
                            <label>LinkedIn</label>
                            <a href="https://www.linkedin.com/in/youcef-bensaidj-electronics/" target="_blank">Youcef BENSAIDJ</a>
                        </div>
                    </div>
                    <div class="info-item">
                        <span class="icon">📍</span>
                        <div>
                            <label>Localisation</label>
                            <span>France</span>
                        </div>
                    </div>
                </div>
            </aside>

            <section class="contact-form-section">
                <form id="contact-form" class="contact-form">
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" name="name" placeholder="Votre Nom" required>
                        </div>
                        <div class="form-group">
                            <input type="email" name="email" placeholder="Votre Email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <input type="text" name="subject" placeholder="Objet du message" required>
                    </div>
                    <div class="form-group">
                        <textarea name="message" placeholder="Votre Message..." required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">ENVOYER LE MESSAGE</button>
                </form>
            </section>
        </div>
    </main>

    <script src="../../assets/js/main.js"></script>
</body>
</html>
